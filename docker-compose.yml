services:
  postgres:
    image: postgres:16-alpine
    container_name: fullstack-starter-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fullstack_starter}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - ${POSTGRES_VOLUME_NAME:-fullstack-starter-pgdata}:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-fullstack_starter}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  fullstack-starter-pgdata:
    name: ${POSTGRES_VOLUME_NAME:-fullstack-starter-pgdata}
